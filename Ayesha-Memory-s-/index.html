<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Ayesha Digital Photo Album - Elegant Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 30px 20px;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 123, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 150, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: gradientMove 10s ease-in-out infinite;
        }

        @keyframes gradientMove {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Header Section */
        #header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            z-index: 1;
        }

        #header h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            background: linear-gradient(135deg, #fff 0%, #007bff 50%, #00d2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: 3px;
            animation: titleGlow 2s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(0, 123, 255, 0.3); }
            50% { text-shadow: 0 0 40px rgba(0, 123, 255, 0.6); }
        }

        #header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            letter-spacing: 1px;
        }

        /* Page Controls */
        #page-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: linear-gradient(135deg, #555, #333);
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
        }

        #page-counter {
            font-size: 1.1rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 24px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Grid Container */
        #grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .thumbnail-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            cursor: pointer;
            aspect-ratio: 1;
        }

        .thumbnail-wrapper:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 25px 45px rgba(102, 126, 234, 0.4);
        }

        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.5s ease;
            display: block;
        }

        .thumbnail-wrapper:hover .thumbnail {
            transform: scale(1.05);
        }

        /* Image Overlay Effect */
        .thumbnail-wrapper::after {
            content: '🔍';
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            transform: translateY(10px);
        }

        .thumbnail-wrapper:hover::after {
            opacity: 1;
            transform: translateY(0);
        }

        /* Modal */
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(25px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.4s ease;
        }

        #modal-image {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            animation: zoomIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #modal-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            padding: 12px 25px;
            border-radius: 60px;
            z-index: 2001;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #modal-controls button {
            padding: 10px 20px;
            font-size: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        #modal-close {
            position: absolute;
            top: 25px;
            right: 25px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 12px 24px;
            z-index: 2001;
            min-width: 100px;
        }

        #modal-close:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 30px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            margin: 60px auto;
            max-width: 550px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.6s ease;
        }

        .empty-state h3 {
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #007bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Image Counter */
        .image-count {
            text-align: center;
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            position: relative;
            z-index: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(5px);
        }

        .valid-count {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            #grid-container {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }

            button {
                padding: 10px 20px;
                font-size: 13px;
            }

            #page-counter {
                font-size: 0.95rem;
                padding: 8px 18px;
            }

            #modal-controls {
                bottom: 20px;
                gap: 12px;
                padding: 10px 20px;
            }

            #modal-controls button {
                padding: 8px 16px;
                font-size: 12px;
            }

            #modal-close {
                top: 15px;
                right: 15px;
                padding: 8px 16px;
                min-width: 80px;
            }
        }

        @media (max-width: 480px) {
            #grid-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            #page-controls {
                gap: 12px;
            }

            .empty-state h3 {
                font-size: 1.5rem;
            }
        }

        /* Loading Animation for Images */
        .thumbnail-wrapper {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .thumbnail {
            animation: fadeInImage 0.5s ease;
        }

        @keyframes fadeInImage {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

        const IMAGES_PER_PAGE = 12;
        let currentPage = 0;
        let modalIndex = 0;
        
        const gridContainer = document.getElementById('grid-container');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-image');

        const totalCountSpan = document.getElementById('total-count');

        // Render the grid directly
        function renderGrid() {
            if (images.length === 0) {
                gridContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>📷 No Images Found</h3>
                        <p>Please add images to the gallery.</p>
                    </div>
                `;
                pageCounter.textContent = `Page 0 of 0`;
                gridPrev.disabled = true;
                gridNext.disabled = true;
                totalCountSpan.innerHTML = `📸 Total Images: 0`;
                return;
            }
            
            gridContainer.innerHTML = '';
            const start = currentPage * IMAGES_PER_PAGE;
            const end = Math.min(start + IMAGES_PER_PAGE, images.length);
            
            for (let i = start; i < end; i++) {
                const wrapper = document.createElement('div');
                wrapper.classList.add('thumbnail-wrapper');
                
                const thumb = document.createElement('img');
                thumb.src = images[i];
                thumb.alt = `Memory ${i + 1}`;
                thumb.classList.add('thumbnail');
                thumb.loading = 'lazy';
                
                thumb.onclick = () => openModal(i);
                
                wrapper.appendChild(thumb);
                gridContainer.appendChild(wrapper);
            }
            
            const totalPages = Math.ceil(images.length / IMAGES_PER_PAGE);
            pageCounter.textContent = `Page ${currentPage + 1} of ${totalPages}`;
            gridPrev.disabled = currentPage === 0;
            gridNext.disabled = end >= images.length;
            
            totalCountSpan.innerHTML = `📸 ${images.length} Beautiful Memories ✨`;
        }

        function openModal(index) {
            if (images.length === 0) return;
            modalIndex = index;
            modalImg.src = images[modalIndex];
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }

        function nextModal() {
            if (images.length === 0) return;
            modalIndex = (modalIndex + 1) % images.length;
            modalImg.src = images[modalIndex];
        }

        function prevModal() {
            if (images.length === 0) return;
            modalIndex = (modalIndex + images.length - 1) % images.length;
            modalImg.src = images[modalIndex];
        }

        gridPrev.onclick = () => {
            if (currentPage > 0) {
                currentPage--;
                renderGrid();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
        
        gridNext.onclick = () => {
            if ((currentPage + 1) * IMAGES_PER_PAGE < images.length) {
                currentPage++;
                renderGrid();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
        
        modalClose.onclick = closeModal;
        modal.onclick = (e) => {
            if (e.target.id === 'modal') closeModal();
        };
        modalPrev.onclick = prevModal;
        modalNext.onclick = nextModal;
        
        modalDownload.onclick = function() {
            if (images.length === 0) return;
            const filename = images[modalIndex].split('/').pop();
            const a = document.createElement('a');
            a.href = modalImg.src;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        // Keyboard navigation
        document.onkeydown = (e) => {
            if (modal.style.display === 'flex') {
                if (e.key === 'Escape') closeModal();
                if (e.key === 'ArrowLeft') prevModal();
                if (e.key === 'ArrowRight') nextModal();
            }
        };

        // Touch swipe support
        let touchStartX = 0;
        let touchEndX = 0;
        
        modal.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
        
        modal.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const swipeDistance = touchEndX - touchStartX;
            if (Math.abs(swipeDistance) > 50) {
                if (swipeDistance > 0) {
                    prevModal();
                } else {
                    nextModal();
                }
            }
        });
        
        // Initialize gallery
        renderGrid();
    </script>
</body>
</html>
